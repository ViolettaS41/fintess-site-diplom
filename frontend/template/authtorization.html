<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/authtorization.css">
    <title>PowerZone - фитнес клуб</title>
</head>
<body>
    <!-- Header -->
     <header>
        <div class="container">
            <div class="header-inner">
                <div class="header-logo">
                    <img src="../img/logo.svg" alt="logo">
                    <p>PowerZone</p>
                </div>
            </div>
        </div>
     </header>

     <!-- Main -->
     <main>
        <div class="container">
            <div class="main-inner">
                <div class="main-content">
                    <div class="main-content-back-container">
                        <img src="../img/backup.svg" alt="arrow-left">
                        <a class="main-content-back" href="../index.html">На главную</a>
                    </div>
                    
                    <h1 class="main-content-title">Вход в личный кабинет</h1>
                    <form class="main-content-form" action="">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required placeholder="Email">
                        </div>
                        <div class="form-group">
                            <label for="password">Пароль</label>
                            <input type="password" id="password" name="password" required minlength="8" placeholder="Пароль">
                        </div>
                        <button type="submit">Вход</button>
                    </form>
                    <a class="main-content-registration" href="registration.html">Нет аккаунта? Зарегистрироваться</a>
                </div>
            </div>
        </div>
     </main>
     <!-- Footer -->

     <footer>
        <div class="container">
            <div class="footer-inner">
                <div class="footer-menu">
                    <ul>
                        <li><a href="#">Главная</a></li>
                        <li><a href="#">О нас</a></li>
                        <li><a href="#">Расписание</a></li>
                        <li><a href="#">Тренеры</a></li>
                        <li><a href="#">Контакты</a></li>
                    </ul>
                </div>
                <div class="main-content-contacts-info">
                    <ul>
                        <li>Адрес: г. Красноярск ул. Хххххх, д. 1</li>
                        <li>Телефон: +7900ХХХХХХХ</li>
                        <li>Электронная почта: powerzone@email.com</li>
                    </ul>
                </div>
                <div class="footer-social-right">
                    <div class="footer-social">
                        <a href="#" class="inst"><img src="../img/inst.svg" alt="inst"></a>
                        <a href="#" class="tg"><img src="../img/tg.svg" alt="tg"></a>
                    </div>
                    <div class="footer-right"><p>©PowerZone</p></div>
                </div>
        </div>
    </footer>
</body>
</html>
